version: "3.8"
services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    image: unstableme02/ishani_dms-backend:latest

    volumes:
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      - db
    restart: always
    command: >
      sh -c "python -m alembic upgrade head && 
             uvicorn main:app --host 0.0.0.0 --port 8000"

  frontend:
    image: unstableme02/ishani_dms-frontend:latest
    ports:
      - "18080:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
